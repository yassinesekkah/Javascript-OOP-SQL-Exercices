<script>
  
a = [1, 3, 5];
b = [2, 4, 6, 7, 9];

function mergeSorted(a, b){

  let arr = [];
  let i = 0;
  let j = 0;

  while(i< a.length && j<b.length){
    if(a[i] < b[j]){
      arr.push(a[i]);
      i++;
    }else{
      arr.push(b[j]);
      j++;
    }
  }
  console.log(j, i);

  while(i<a.length){
    arr.push(a[i]);
    i++;
  }

  while(j<b.length){
    arr.push(b[j]);
    j++;
  }

  return arr;
}
console.log(mergeSorted(a, b));


</script>
