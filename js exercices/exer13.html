<script>
  
let para = "Écrire une fonction longestWord (sentence) qui retourne le mot le plus thisthisthisthis long dans une phrase"

function shorstWord(para){
  let words = para.split(" ");

  let shortMot = words[0];
  let shorMotLength = words[0].length;
  
  for(let i=0; i<words.length; i++){
    if(words[i].length < shorMotLength){
      shortMot = words[i];
      shorMotLength = words[i].length;
    }
  }
  return shortMot;
}


console.log(shorstWord(para));
</script>
