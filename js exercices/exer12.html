function longestWord(para){
  let arr = [];
  let index = 0;
  arr[index] = "";

  for(let i=0; i<para.length; i++){
    if(para[i] !== " "){
      arr[index] += para[i];
    }else{
      index++;
      arr[index] = "";
    }
  }
  let longestMot = arr[0];
  let longest = arr[0].length;
  console.log(longest);

  for(let i=0; i<arr.length; i++){
    if(arr[i].length > longest){
      longestMot = arr[i];
      longest = arr[i].length;
    }
  }

  return longestMot;
}
