<script>
  
let para = "Écrire une fonction countChar(str, char) qui retourne le nombre de fois que char apparaît dans str";
let char = "e";

function countChar(str, char){
    let count = 0;

    for(let i=0; i< str.length; i++){

        if(str[i] === char){
            count++;
        }
    }
    
    return count;
}

console.log(countChar(para));
</script>
