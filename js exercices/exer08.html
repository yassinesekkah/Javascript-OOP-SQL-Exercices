<script>
let str = "YAssine Sekkah"

function countVowels(str){
  let count = 0;
  let voyels = ["a", "i", "o", "u", "e"];
  for(let i=0; i<str.length; i++){

    for(let j=0; j<voyels.length; j++){
      if(str[i].toLowerCase() == voyels[j] ){
        count++;
      }
    }
  }
  return count;
}

console.log(countVowels(str));

</script>
