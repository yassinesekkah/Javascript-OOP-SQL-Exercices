<script>
  
let arr = [1, 2, 2, 3, 4, 4];

function removeDuplicate(arr){

  let tab = [];

  for (let i=0; i<arr.length; i++){
    let found = false;

    for(let j=0; j<tab.length; j++){
      if(tab[j] === arr[i]){

        found = true;
        break;
      }
    }
    if(!found){
      tab.push(arr[i]);
    }
  }
  return tab;
}

console.log(removeDuplicate(arr));

</script>
