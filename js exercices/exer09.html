<script>
let str = "YAssine Sekkah"

function toUpper(str){
  let result = "";


  for(let i=0; i<str.length; i++){

    let code = str.charCodeAt(i);

    if(code  >= 97 && code <= 122){
      result += String.fromCharCode(code - 32);
    }
    else{
      result += str[i];
    }
  }
  return result;
}

console.log(toUpper(str));

</script>
